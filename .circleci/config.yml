version: 2.1

jobs:
  validate:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-pip-{{ checksum "requirements.txt" }}
            - v1-pip-
      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
      - save_cache:
          key: v1-pip-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Compile Python sources
          command: |
            . .venv/bin/activate
            python -m compileall src scripts
      - run:
          name: Check docstrings
          command: |
            . .venv/bin/activate
            python - <<'PY'
            from __future__ import annotations

            import ast
            from pathlib import Path

            missing = []
            for root in (Path("src"), Path("scripts")):
                for path in sorted(root.rglob("*.py")):
                    tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
                    if ast.get_docstring(tree) is None:
                        missing.append(f"{path}: module")
                    for node in ast.walk(tree):
                        if isinstance(node, (ast.AsyncFunctionDef, ast.ClassDef, ast.FunctionDef)) and ast.get_docstring(node) is None:
                            missing.append(f"{path}:{node.lineno} {node.name}")

            if missing:
                print("Missing docstrings:")
                print("\n".join(missing))
                raise SystemExit(1)
            PY
      - run:
          name: Smoke test processed-data reader
          command: |
            . .venv/bin/activate
            mkdir -p figures/generated/.mplconfig
            export MPLCONFIGDIR=figures/generated/.mplconfig
            python - <<'PY'
            import sys

            sys.path.insert(0, "src")

            from plotting import read_numeric_series

            values = read_numeric_series("data/processed_data/PBP_dataset/FWHM5/150MeV/PVDR_2Darray_ctc10_150MeV.txt")
            if not values:
                raise SystemExit("Tracked sample profile did not contain values")
            PY

workflows:
  validate:
    jobs:
      - validate
