version: 2.1

jobs:
  validate:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-pip-{{ checksum "requirements.txt" }}
            - v1-pip-
      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
      - save_cache:
          key: v1-pip-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Compile Python sources
          command: |
            . .venv/bin/activate
            python -m compileall src scripts .circleci
      - run:
          name: Check docstrings
          command: |
            . .venv/bin/activate
            python .circleci/check_docstrings.py
      - run:
          name: Check release inputs
          command: |
            . .venv/bin/activate
            python .circleci/check_release_inputs.py
      - run:
          name: Generate public plots
          command: |
            . .venv/bin/activate
            mkdir -p /tmp/pMBRT-analysis-mplconfig
            export MPLCONFIGDIR=/tmp/pMBRT-analysis-mplconfig
            python scripts/plot_peak_pdd.py
            python scripts/plot_valley_pdd.py
            python scripts/plot_pvdr.py
            python scripts/plot_peak_pdd.py --bw 0.7
            python scripts/plot_valley_pdd.py --bw 0.7
            python scripts/plot_pvdr.py --bw 0.7

workflows:
  validate:
    jobs:
      - validate
